name: Mirror to Gitea

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: mirror-to-gitea
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Push main + tags to Gitea mirror
        env:
          DEPLOY_KEY: ${{ secrets.GITEA_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.GITEA_KNOWN_HOSTS }}
          GITEA_REMOTE: ${{ secrets.GITEA_REMOTE }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          git remote add gitea "$GITEA_REMOTE"
          git fetch origin main
          # Non-destructive: only updates main + tags, never --mirror/--delete.
          # If Gitea's main has diverged this fails loudly rather than force-overwriting.
          git push gitea origin/main:refs/heads/main
          git push gitea --tags
